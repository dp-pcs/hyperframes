<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Amplify Case Study — Short (1:1)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Design tokens — mirrors shared/tokens.css. Inlined so short/ is
         self-contained for `hyperframes validate` (which serves only from
         the project root). Keep in sync with ../shared/tokens.css and the
         identical inline block in ../master/index.html. */
      :root {
        --ink: #08090b;
        --ink-elevated: #12141a;
        --ink-line: #1f232c;
        --ink-soft: #2a2f3b;
        --paper: #f5f2ec;
        --paper-muted: #8b8e96;
        --paper-dim: #5a5e68;
        --signal: #22d67a;
        --signal-soft: rgba(34, 214, 122, 0.15);
        --warn: #f4a641;
        --warn-soft: rgba(244, 166, 65, 0.18);
        --code: #7dd3fc;
        --code-soft: rgba(125, 211, 252, 0.15);
        --font-display: "Inter Tight", "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      }
      [data-composition-id^="amplify-case-study"] {
        position: absolute;
        inset: 0;
        background: var(--ink);
        color: var(--paper);
        font-family: "Inter Tight", "Inter", system-ui, sans-serif;
        overflow: hidden;
      }
      .hf-hairline {
        position: absolute;
        bottom: 80px;
        left: 96px;
        height: 1px;
        background: var(--signal);
        transform-origin: left center;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1080px;
        height: 1080px;
        background: #08090b;
      }
      #stage {
        position: relative;
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: var(--ink);
      }
      .clip {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="amplify-case-study-short"
      data-start="0"
      data-duration="30"
      data-width="1080"
      data-height="1080"
    >
      <!-- Beat 1 — Template Grid (0..8s) -->
      <div
        class="clip"
        data-composition-id="amplify-case-study-short-1"
        data-composition-src="compositions/sbeat-1-template-grid.html"
        data-start="0"
        data-duration="8"
        data-track-index="0"
      ></div>

      <!-- Beat 2 — The Delete (8..14s) -->
      <div
        class="clip"
        data-composition-id="amplify-case-study-short-2"
        data-composition-src="compositions/sbeat-2-delete.html"
        data-start="8"
        data-duration="6"
        data-track-index="0"
      ></div>

      <!-- Beat 3 — Bespoke Grid (14..24s) -->
      <div
        class="clip"
        data-composition-id="amplify-case-study-short-3"
        data-composition-src="compositions/sbeat-3-bespoke-grid.html"
        data-start="14"
        data-duration="10"
        data-track-index="0"
      ></div>

      <!-- Beat 4 — Lesson (24..30s) -->
      <div
        class="clip"
        data-composition-id="amplify-case-study-short-4"
        data-composition-src="compositions/sbeat-4-lesson.html"
        data-start="24"
        data-duration="6"
        data-track-index="0"
      ></div>

      <!-- Per-line narration. Offsets from short-line-N.mp3 durations:
           line-1=3.52s, line-2=3.95s, line-3=2.54s, line-4=3.18s.
           Lines start ~0.3s into each beat, matching master cut convention.
           The `narration` symlink (short/narration -> ../narration) keeps
           lint's project-root file resolver happy. -->
      <audio
        id="short-narration-line-1"
        data-start="0.3"
        data-duration="3.6"
        data-track-index="1"
        data-volume="1.0"
        src="narration/lines/short-line-1.mp3"
      ></audio>
      <audio
        id="short-narration-line-2"
        data-start="8.3"
        data-duration="4.0"
        data-track-index="1"
        data-volume="1.0"
        src="narration/lines/short-line-2.mp3"
      ></audio>
      <audio
        id="short-narration-line-3"
        data-start="14.3"
        data-duration="2.6"
        data-track-index="1"
        data-volume="1.0"
        src="narration/lines/short-line-3.mp3"
      ></audio>
      <audio
        id="short-narration-line-4"
        data-start="24.3"
        data-duration="3.2"
        data-track-index="1"
        data-volume="1.0"
        src="narration/lines/short-line-4.mp3"
      ></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Short timeline is just a paused stub — each beat owns its own
      // child timeline. The runtime activates each clip when the playhead
      // enters its data-start..data-start+data-duration window.
      window.__timelines = window.__timelines || {};
      window.__timelines["amplify-case-study-short"] = gsap.timeline({
        paused: true,
      });
    </script>
  </body>
</html>
