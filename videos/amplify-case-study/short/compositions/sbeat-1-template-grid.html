    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Top-right label fades in immediately
      tl.from(
        '[data-composition-id="amplify-case-study-short-1"] .sb1-label',
        { opacity: 0, duration: 0.3 },
        0,
      );

      // Cells populate one-by-one with subtle scale.
      // Compressed from master (0.12s stagger → 0.08s) to fit in 8s vs 10s.
      tl.from(
        '[data-composition-id="amplify-case-study-short-1"] .sb1-cell',
        {
          opacity: 0,
          scale: 0.96,
          duration: 0.45,
          ease: "power3.out",
          stagger: 0.08,
        },
        0.25,
      );

      // Hairline grows across same window as cells populating.
      tl.fromTo(
        '[data-composition-id="amplify-case-study-short-1"] .sb1-hairline',
        { scaleX: 0.32 },
        { scaleX: 1.0, duration: 1.4, ease: "power2.out" },
        0.25,
      );

      // Synchronized pulse on all cells — "breathing together".
      // Master beat-2 ran this at 3..5.5s over 10s; scale to 2.4..4.4s over 8s.
      tl.to(
        '[data-composition-id="amplify-case-study-short-1"] .sb1-cell',
        {
          keyframes: [{ opacity: 0.85 }, { opacity: 1.0 }, { opacity: 0.85 }],
          duration: 2.0,
          ease: "sine.inOut",
          repeat: 0,
        },
        2.4,
      );

      // Caption word-by-word reveal at 3.2s (master started caption at 4s of 10s;
      // proportional placement at 3.2s of 8s keeps the same rhythm).
      tl.from(
        '[data-composition-id="amplify-case-study-short-1"] .sb1-caption .sb1-word',
        {
          y: 24,
          opacity: 0,
          duration: 0.4,
          ease: "power3.out",
          stagger: 0.1,
        },
        3.2,
      );

      // Final settle — slight dim across grid to push caption forward at end.
      // (No zoom-cell beat here: short-1's job is to set the "same-y-same"
      // baseline that short-2 disrupts. Beat 3 / sbeat-3 is where bespoke
      // variety enters.)
      tl.to(
        '[data-composition-id="amplify-case-study-short-1"] .sb1-cell',
        { opacity: 0.55, duration: 0.5 },
        7.2,
      );

      window.__timelines["amplify-case-study-short-1"] = tl;
